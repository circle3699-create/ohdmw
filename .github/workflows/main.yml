name: Daily News Dispatcher

on:
  schedule:
    # 여기가 바로 타이머입니다! (분 시간 일 월 요일)
    # '0 0 * * *' = 매일 UTC 0시 0분 = 한국 시간 매일 아침 9시 0분
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동으로도 스위치를 켤 수 있게 해주는 버튼입니다.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python main.py
